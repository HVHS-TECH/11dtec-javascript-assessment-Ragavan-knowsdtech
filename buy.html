<!DOCTYPE html>
<html>
<head>
    <title>CalciRaw - Fresh Milk</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <img src="CalciRaw1.png" style="width:300px;height:210px;">
    <h1>Buy Milk</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="buy.html">Buy</a>
    <a href="Contact.html">Contact</a>
</nav>
<h1>Get some of that fresh goodness. <p>$5 - $7 per bottle of milk!</p></h1>

<div class="products">

    <div class="product">
        <img src="choc.png" alt="Chocolate Milk">
        <h2>Chocolate Milk</h2>
        <p>$6.99</p>
    </div>

    <div class="product">
        <img src="Milk1.png" alt="Standard Milk">
        <h2>Standard Milk</h2>
        <p>$5.99</p>
    </div>

    <div class="product">
        <img src="glass bottle.png" alt="Glass Bottle">
        <h2>Glass Bottle Milk</h2>
        <p>$3.99</p>
    </div>

</div>
<h2>Order Form</h2>
<label for="customerName">Name:</label>
<input type="text" id="customerName" placeholder="Enter your name" required>

<br><br>

<label for="milkType">Choose Milk:</label>
<select id="milkType">
    <option value="glass">Glass Bottle Milk ($3.99)</option>
    <option value="standard">Standard Milk ($5.99)</option>
    <option value="chocolate">Chocolate Milk ($6.99)</option>
</select>

<br><br>

<label for="quantity">Quantity:</label>
<input type="number" id="quantity" min="1" value="1">

<button onclick="addItem()">Add to Order</button>

<h3>Current Order</h3>
<p id="orderList">
    Glass Bottle Milk: 0<br>
    Standard Milk: 0<br>
    Chocolate Milk: 0
</p>

<label for="money">Money Available ($)</label>
<input type="number" id="money" step="0.1" required>

<br><br>

<button onclick="checkout()">Checkout</button>
<button onclick="clearForm()" class="clear-button">Clear Form</button>
<h3 id="output"></h3>

<footer>
    <p>CalciRaw - Fresh Milk for you</p>
</footer>

<script src="script.js"></script>

</body>
</html>
